name: Deploy to OrbStack

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 10

    - name: Write .env
      run: |
        cat > .env << EOF
        VITE_QUESTLOG_URL=${{ vars.VITE_QUESTLOG_URL }}
        VITE_HOMEASSISTANT_URL=${{ vars.VITE_HOMEASSISTANT_URL }}
        VITE_HOMEASSISTANT_TOKEN=${{ secrets.VITE_HOMEASSISTANT_TOKEN }}
        VITE_TEMPEST_TOKEN=${{ secrets.VITE_TEMPEST_TOKEN }}
        VITE_TEMPEST_DEVICE_ID=${{ vars.VITE_TEMPEST_DEVICE_ID }}
        VITE_TEMPEST_STATION_ID=${{ vars.VITE_TEMPEST_STATION_ID }}
        EOF

    - name: Deploy containers
      run: |
        docker compose -f docker-compose.prod.yml up --build --force-recreate -d --remove-orphans

    - name: Clean up old Docker images
      run: |
        docker image prune -f
