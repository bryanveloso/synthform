services:
  # Synthform's DB — only used by IronMON for now (Challenge, Seed, Result models)
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: synthform
      POSTGRES_USER: synthform
      POSTGRES_PASSWORD: synthform
    volumes:
      - postgres_data:/var/lib/postgresql/data

  tailscale:
    image: tailscale/tailscale:latest
    hostname: synthform
    environment:
      - TS_AUTHKEY=${TAILSCALE_CLIENT_SECRET}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale_data:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  ironmon:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://synthform:synthform@db:5432/synthform
      - REDIS_URL=redis://synthfunc-redis-1:6379/0
    ports:
      - "8080:8080"
    networks:
      - default
      - synth
    command: uv run python manage.py run_ironmon_tcp

  overlays:
    build:
      context: ./apps/overlays
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8008:8008"

networks:
  default:
  synth:
    external: true

volumes:
  postgres_data:
  tailscale_data: